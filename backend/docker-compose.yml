services:
  # 1. The Message Broker & Cache
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. The FastAPI Web Server
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  # 3. The Background AI Worker
  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - web